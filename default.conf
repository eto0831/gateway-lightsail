# =========================
# HTTP -> HTTPS redirect
# =========================
server {
    listen 80;
    server_name rese.eto-tech.com runmaru.eto-tech.com;

    # ACME challenge（Let's Encrypt）
location ^~ /.well-known/acme-challenge/ {
    root /var/www/certbot;
    try_files $uri =404;
}

    location / {
        return 301 https://$host$request_uri;
    }
}

# =========================
# HTTPS: rese
# =========================
server {
    listen 443 ssl http2;
    server_name rese.eto-tech.com;

    ssl_certificate     /etc/letsencrypt/live/rese.eto-tech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rese.eto-tech.com/privkey.pem;

    # TLSの最低限（安全寄り）
    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;

    # proxy（rese 側へ）
    location / {
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://rese-front-nginx-1:80;
    }
}

# =========================
# HTTPS: runmaru
# =========================
server {
    listen 443 ssl http2;
    server_name runmaru.eto-tech.com;

    # 同じ証明書（rese + runmaru のSAN入り）を使う
    ssl_certificate     /etc/letsencrypt/live/rese.eto-tech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rese.eto-tech.com/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:MozSSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;

    # proxy（runmaru 側へ）
    location / {
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass http://runmaru-nginx-1:80;
    }
}